<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Coptic Scanner">
  <meta name="theme-color" content="#f7f3e8">
  <title>Coptic Festival QR Scanner</title>
  
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      user-select: none;
    }

    body {
      background: #f7f3e8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Georgia', serif;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 0.5rem;
      margin: 0;
    }

    .app-container {
      max-width: 500px;
      width: 100%;
      background: #fffef9;
      border-radius: 2rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .app-header {
      background: linear-gradient(180deg, #fffdf7 0%, #fef9ed 100%);
      padding: 1rem;
      text-align: center;
      border-bottom: 2px solid #d4a843;
    }

    .church-name {
      font-family: 'Georgia', serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: #4e3b28;
      text-transform: uppercase;
    }

    .sub-title {
      font-size: 0.75rem;
      color: #7b5e3b;
      font-style: italic;
    }

    .festival-banner {
      font-size: 0.8rem;
      color: #b48b3a;
      font-weight: 600;
    }

    .scan-section {
      padding: 1rem;
      text-align: center;
      background: #fdf8ed;
      border-bottom: 2px solid #e0c98a;
    }

    .scan-btn {
      background: #2d5e3b;
      color: white;
      border: none;
      padding: 1rem 2rem;
      border-radius: 2rem;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      transition: all 0.2s;
    }

    .scan-btn:active {
      transform: scale(0.96);
      background: #1e4620;
    }

    .scan-btn.scanning {
      background: #c9a855;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    .progress-bar {
      width: 100%;
      height: 6px;
      background: #e0c98a;
      border-radius: 3px;
      margin-top: 0.8rem;
      display: none;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: #2d5e3b;
      border-radius: 3px;
      width: 0%;
      transition: width 0.3s;
    }

    .status-text {
      font-size: 0.8rem;
      color: #6b5a44;
      margin-top: 0.5rem;
      min-height: 20px;
      font-weight: 500;
    }

    .preview-image {
      max-width: 100%;
      max-height: 250px;
      border-radius: 1rem;
      border: 2px solid #d4a843;
      margin-top: 0.8rem;
      display: none;
    }

    .results-summary {
      display: none;
      background: #d4edda;
      color: #155724;
      padding: 0.5rem 1rem;
      border-radius: 1rem;
      margin-top: 0.5rem;
      font-weight: 600;
      font-size: 0.85rem;
    }

    .tabs {
      display: flex;
      border-bottom: 2px solid #d4a843;
      background: #fdf8ed;
    }

    .tab {
      flex: 1;
      padding: 0.6rem 0.3rem;
      text-align: center;
      font-weight: 600;
      color: #8b754f;
      cursor: pointer;
      font-size: 0.75rem;
      border: none;
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .tab.active {
      color: #4e3b28;
      border-bottom: 3px solid #b48b3a;
      background: #fffef9;
    }

    .menu-content {
      flex: 1;
      overflow-y: auto;
      padding: 0.3rem 0;
      -webkit-overflow-scrolling: touch;
    }

    .tab-panel {
      display: none;
      padding: 0 0.5rem;
    }

    .tab-panel.active {
      display: block;
    }

    .menu-item {
      display: flex;
      align-items: center;
      padding: 0.5rem 0.3rem;
      border-bottom: 1px dotted rgba(160, 120, 60, 0.2);
      gap: 0.4rem;
      flex-wrap: wrap;
      transition: background 0.3s;
    }

    .menu-item.scanned {
      background: #fffde7;
      border-left: 4px solid #2d5e3b;
    }

    .item-code {
      background: #4e3b28;
      color: #f7f3e8;
      font-weight: 700;
      font-size: 0.7rem;
      padding: 0.2rem 0.4rem;
      border-radius: 0.5rem;
      min-width: 35px;
      text-align: center;
      font-family: 'Courier New', monospace;
    }

    .item-info {
      flex: 1;
      min-width: 90px;
    }

    .item-name {
      font-weight: 600;
      font-size: 0.75rem;
      color: #3f3322;
      display: block;
    }

    .arabic-name {
      font-size: 0.65rem;
      color: #8b754f;
      font-style: italic;
      display: block;
    }

    .item-price {
      font-weight: 700;
      font-size: 0.7rem;
      color: #2d5e3b;
      background: #edf4e8;
      padding: 0.15rem 0.4rem;
      border-radius: 0.8rem;
      white-space: nowrap;
    }

    .qty-controls {
      display: flex;
      align-items: center;
      gap: 0.2rem;
    }

    .qty-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 1.5px solid #c9a855;
      background: white;
      font-size: 1rem;
      font-weight: 700;
      color: #4e3b28;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .qty-btn:active {
      background: #f3e5ca;
      transform: scale(0.93);
    }

    .qty-input {
      width: 36px;
      height: 28px;
      border: 1.5px solid #c9a855;
      border-radius: 0.6rem;
      text-align: center;
      font-weight: 700;
      font-size: 0.85rem;
      background: white;
      color: #3e2e1c;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .qty-input.scanned-qty {
      background: #fffde7;
      border-color: #2d5e3b;
      border-width: 2px;
      font-weight: 800;
    }

    .item-total {
      font-weight: 700;
      font-size: 0.75rem;
      color: #1e4620;
      background: #eaf4e5;
      padding: 0.15rem 0.4rem;
      border-radius: 0.8rem;
      min-width: 50px;
      text-align: center;
      font-family: 'Courier New', monospace;
    }

    .bottom-bar {
      background: #f9f2e0;
      padding: 0.8rem 1rem;
      border-top: 2px solid #ddbc7a;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .total-label {
      font-family: 'Georgia', serif;
      font-weight: 700;
      font-size: 0.9rem;
      color: #5c471f;
      text-transform: uppercase;
    }

    .total-value {
      background: white;
      padding: 0.4rem 1rem;
      border-radius: 1.5rem;
      font-size: 1.2rem;
      font-weight: 700;
      color: #2b4f2b;
      font-family: 'Courier New', monospace;
      border: 1px solid #ddbc7a;
      transition: all 0.3s;
    }

    .total-value.updated {
      background: #d4edda;
      transform: scale(1.05);
    }

    .reset-btn {
      background: #e7d5b5;
      border: none;
      padding: 0.4rem 0.8rem;
      border-radius: 1.5rem;
      font-weight: 600;
      color: #4e3b28;
      cursor: pointer;
      font-size: 0.8rem;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    #fileInput {
      display: none;
    }
  </style>
</head>
<body>
  <div class="app-container">
    
    <div class="app-header">
      <div class="church-name">OUR LADY OF ZEITOUN</div>
      <div class="sub-title">Coptic Orthodox Church</div>
      <div class="festival-banner">✦ Annual Egyptian Coptic Festival ✦</div>
    </div>

    <div class="scan-section">
      <button class="scan-btn" id="scanBtn" onclick="document.getElementById('fileInput').click()">
        📸 Photograph Order Slip
      </button>
      <input type="file" id="fileInput" accept="image/*" capture="environment">
      <div class="progress-bar" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="status-text" id="statusText">Take a photo of the printed order slip</div>
      <div class="results-summary" id="resultsSummary"></div>
      <img class="preview-image" id="previewImage" alt="Scanned order slip">
    </div>

    <div class="tabs">
      <button class="tab active" id="tab-sandwiches" onclick="switchTab('sandwiches')">🥙 Sandwiches</button>
      <button class="tab" id="tab-mains" onclick="switchTab('mains')">🍖 Main Dishes</button>
    </div>

    <div class="menu-content">
      <div class="tab-panel active" id="sandwiches-panel"></div>
      <div class="tab-panel" id="mains-panel"></div>
    </div>

    <div class="bottom-bar">
      <span class="total-label">💰 TOTAL</span>
      <span class="total-value" id="grandTotal">$0.00</span>
      <button class="reset-btn" onclick="resetAll()">🔄 Clear</button>
    </div>
  </div>

  <script>
    const menuData = {
      sandwiches: [
        { code: 'S1', name: 'Beef Liver (Kebda)', arabic: 'ساندوتش كبدة', price: 7.00, qty: 0, scanned: false },
        { code: 'S2', name: 'Egyptian Sausage', arabic: 'ساندوتش سجق', price: 8.00, qty: 0, scanned: false },
        { code: 'S3', name: 'Kofta (ground beef)', arabic: 'ساندوتش كفتة', price: 10.00, qty: 0, scanned: false },
        { code: 'S4', name: 'Hawawshi (Ground Beef Pita)', arabic: 'حواشي', price: 10.00, qty: 0, scanned: false },
        { code: 'S5', name: 'Beef Shawerma', arabic: 'شاورمة لحمة', price: 10.00, qty: 0, scanned: false },
        { code: 'S6', name: 'Chicken Shawerma', arabic: 'شاورمة فراخ', price: 9.00, qty: 0, scanned: false },
        { code: 'S7', name: 'Feteer Savory Small', arabic: 'فطير حادق صغير', price: 15.00, qty: 0, scanned: false },
        { code: 'S8', name: 'Feteer Savory Large', arabic: 'فطير حادق كبير', price: 25.00, qty: 0, scanned: false },
        { code: 'S9', name: 'Feteer Sweet Small', arabic: 'فطير حلو صغير', price: 10.00, qty: 0, scanned: false },
        { code: 'S10', name: 'Feteer Sweet Large', arabic: 'فطير حلو كبير', price: 20.00, qty: 0, scanned: false },
        { code: 'S11', name: 'Plain Feteer Small', arabic: 'فطير سادة صغير', price: 5.00, qty: 0, scanned: false }
      ],
      mains: [
        { code: 'M1', name: '1 Piece Kofta (grilled)', arabic: 'واحدة كفتة', price: 3.00, qty: 0, scanned: false },
        { code: 'M2', name: 'Beef Kebab Skewer', arabic: 'كباب لحم', price: 8.00, qty: 0, scanned: false },
        { code: 'M3', name: 'Chicken Kebab Skewer', arabic: 'كباب فراخ', price: 7.00, qty: 0, scanned: false },
        { code: 'M4', name: '5 Stuffed Grape Leaves', arabic: 'محشي ورق عنب', price: 3.00, qty: 0, scanned: false },
        { code: 'M5', name: '2 Piece Mombar (Sausage)', arabic: 'ممبار', price: 3.00, qty: 0, scanned: false },
        { code: 'M6', name: 'Bechamel Pasta', arabic: 'مكرونة بشاميل', price: 10.00, qty: 0, scanned: false },
        { code: 'M7', name: 'Lamb Shank & Rice Meal', arabic: 'موزة خروف مع رز وورق عنب', price: 20.00, qty: 0, scanned: false },
        { code: 'M8', name: '1/2 Grilled Chicken & Rice', arabic: 'نص فرخة مشوية مع رز', price: 15.00, qty: 0, scanned: false },
        { code: 'M9', name: 'Rice with Nuts', arabic: 'رز بالخلطة', price: 3.00, qty: 0, scanned: false },
        { code: 'M10', name: 'Chicken Quesadilla', arabic: 'فراخ بالجبنة', price: 9.00, qty: 0, scanned: false },
        { code: 'M11', name: '4 Chicken Wings & Fries', arabic: 'أجنحة وبطاطس', price: 5.00, qty: 0, scanned: false },
        { code: 'M12', name: 'Duck Leg & Rice', arabic: 'بطة ورز', price: 10.00, qty: 0, scanned: false }
      ]
    };

    // Handle file selection
    document.getElementById('fileInput').addEventListener('change', async function(e) {
      const file = e.target.files[0];
      if (!file) return;
      
      // Show preview
      const reader = new FileReader();
      reader.onload = function(ev) {
        document.getElementById('previewImage').src = ev.target.result;
        document.getElementById('previewImage').style.display = 'block';
      };
      reader.readAsDataURL(file);
      
      // Start scanning QR codes in the image
      await scanImageForQRCodes(file);
      this.value = '';
    });

    async function scanImageForQRCodes(imageFile) {
      const scanBtn = document.getElementById('scanBtn');
      const progressBar = document.getElementById('progressBar');
      const progressFill = document.getElementById('progressFill');
      const statusText = document.getElementById('statusText');
      const resultsSummary = document.getElementById('resultsSummary');
      
      scanBtn.classList.add('scanning');
      scanBtn.textContent = '🔍 Scanning QR Codes...';
      progressBar.style.display = 'block';
      resultsSummary.style.display = 'none';
      
      // Reset scanned flags
      for (const category in menuData) {
        menuData[category].forEach(item => item.scanned = false);
      }
      
      try {
        statusText.textContent = 'Loading image...';
        progressFill.style.width = '20%';
        
        // Create image element
        const img = new Image();
        const imageUrl = URL.createObjectURL(imageFile);
        
        await new Promise((resolve, reject) => {
          img.onload = resolve;
          img.onerror = reject;
          img.src = imageUrl;
        });
        
        statusText.textContent = 'Scanning QR codes...';
        progressFill.style.width = '50%';
        
        // Draw image to canvas
        const canvas = document.createElement('canvas');
        canvas.width = img.width;
        canvas.height = img.height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0);
        
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        
        statusText.textContent = 'Detecting QR codes...';
        progressFill.style.width = '70%';
        
        // Try to find QR codes at multiple scales for better detection
        const scales = [1, 0.75, 0.5];
        let allCodes = [];
        
        for (const scale of scales) {
          const scaledCanvas = document.createElement('canvas');
          scaledCanvas.width = canvas.width * scale;
          scaledCanvas.height = canvas.height * scale;
          const scaledCtx = scaledCanvas.getContext('2d');
          scaledCtx.drawImage(canvas, 0, 0, scaledCanvas.width, scaledCanvas.height);
          const scaledData = scaledCtx.getImageData(0, 0, scaledCanvas.width, scaledCanvas.height);
          
          const code = jsQR(scaledData.data, scaledCanvas.width, scaledCanvas.height);
          if (code && code.data.startsWith('COPTC:')) {
            // Check if this code was already found (avoid duplicates from different scales)
            if (!allCodes.find(c => c.data === code.data)) {
              allCodes.push(code);
            }
          }
        }
        
        progressFill.style.width = '90%';
        statusText.textContent = 'Processing results...';
        
        // Process found QR codes
        let itemsFound = 0;
        const foundCodes = new Set();
        
        for (const code of allCodes) {
          const parts = code.data.split(':');
          if (parts.length >= 3) {
            const itemCode = parts[1];
            
            // Find and update the item
            for (const category in menuData) {
              const item = menuData[category].find(i => i.code === itemCode);
              if (item && !foundCodes.has(itemCode)) {
                item.qty += 1;
                item.scanned = true;
                foundCodes.add(itemCode);
                itemsFound++;
                break;
              }
            }
          }
        }
        
        progressFill.style.width = '100%';
        
        if (itemsFound > 0) {
          statusText.textContent = `✅ Found ${itemsFound} items!`;
          resultsSummary.textContent = `🎉 ${itemsFound} items detected from QR codes`;
          resultsSummary.style.display = 'block';
        } else {
          statusText.textContent = '⚠️ No QR codes found. Try better lighting.';
          resultsSummary.style.display = 'none';
        }
        
        // Re-render and update total
        renderAll();
        updateGrandTotal();
        
        URL.revokeObjectURL(imageUrl);
        
      } catch (error) {
        console.error('Scan error:', error);
        statusText.textContent = '❌ Error scanning image. Try again.';
      }
      
      // Reset UI
      setTimeout(() => {
        scanBtn.classList.remove('scanning');
        scanBtn.textContent = '📸 Photograph Order Slip';
        progressBar.style.display = 'none';
        progressFill.style.width = '0%';
      }, 2000);
    }

    function renderAll() {
      renderCategory('sandwiches');
      renderCategory('mains');
    }

    function renderCategory(category) {
      const panel = document.getElementById(category + '-panel');
      const items = menuData[category];
      
      panel.innerHTML = items.map((item, index) => `
        <div class="menu-item${item.scanned ? ' scanned' : ''}">
          <span class="item-code">${item.code}</span>
          <div class="item-info">
            <span class="item-name">${item.name}</span>
            ${item.arabic ? `<span class="arabic-name">${item.arabic}</span>` : ''}
          </div>
          <span class="item-price">$${item.price.toFixed(2)}</span>
          <div class="qty-controls">
            <button class="qty-btn" onclick="changeQty('${category}', ${index}, -1)">−</button>
            <input type="number" class="qty-input${item.scanned ? ' scanned-qty' : ''}" value="${item.qty}" min="0" 
              onchange="setQty('${category}', ${index}, this.value)" 
              onfocus="this.select()">
            <button class="qty-btn" onclick="changeQty('${category}', ${index}, 1)">+</button>
          </div>
          <span class="item-total">$${(item.price * item.qty).toFixed(2)}</span>
        </div>
      `).join('');
    }

    window.changeQty = function(category, index, delta) {
      const item = menuData[category][index];
      item.qty = Math.max(0, item.qty + delta);
      item.scanned = item.qty > 0;
      renderAll();
      updateGrandTotal();
    };

    window.setQty = function(category, index, value) {
      const item = menuData[category][index];
      item.qty = Math.max(0, parseInt(value) || 0);
      item.scanned = item.qty > 0;
      renderAll();
      updateGrandTotal();
    };

    function updateGrandTotal() {
      let total = 0;
      for (const category in menuData) {
        menuData[category].forEach(item => {
          total += item.price * item.qty;
        });
      }
      const totalEl = document.getElementById('grandTotal');
      totalEl.textContent = '$' + total.toFixed(2);
      totalEl.classList.add('updated');
      setTimeout(() => totalEl.classList.remove('updated'), 500);
    }

    window.resetAll = function() {
      if (confirm('Clear all quantities?')) {
        for (const category in menuData) {
          menuData[category].forEach(item => {
            item.qty = 0;
            item.scanned = false;
          });
        }
        renderAll();
        updateGrandTotal();
        document.getElementById('previewImage').style.display = 'none';
        document.getElementById('resultsSummary').style.display = 'none';
        document.getElementById('statusText').textContent = 'Take a photo of the printed order slip';
      }
    };

    window.switchTab = function(tab) {
      document.getElementById('tab-sandwiches').classList.remove('active');
      document.getElementById('tab-mains').classList.remove('active');
      document.getElementById('sandwiches-panel').classList.remove('active');
      document.getElementById('mains-panel').classList.remove('active');
      
      if (tab === 'sandwiches') {
        document.getElementById('tab-sandwiches').classList.add('active');
        document.getElementById('sandwiches-panel').classList.add('active');
      } else {
        document.getElementById('tab-mains').classList.add('active');
        document.getElementById('mains-panel').classList.add('active');
      }
    };

    renderAll();
    updateGrandTotal();
    console.log('✅ QR Code Order Slip Scanner ready!');
  </script>
</body>
</html>
