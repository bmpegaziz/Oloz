<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Coptic Festival">
  <meta name="theme-color" content="#f7f3e8">
  <title>Coptic Festival Order Calculator</title>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      user-select: none;
    }

    body {
      background: #f7f3e8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Georgia', serif;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 0.5rem;
      margin: 0;
    }

    .app-container {
      max-width: 500px;
      width: 100%;
      background: #fffef9;
      border-radius: 2rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .app-header {
      background: linear-gradient(180deg, #fffdf7 0%, #fef9ed 100%);
      padding: 1.2rem 1rem 1rem;
      text-align: center;
      border-bottom: 2px solid #d4a843;
    }

    .church-name {
      font-family: 'Georgia', serif;
      font-size: 1.3rem;
      font-weight: 700;
      color: #4e3b28;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .sub-title {
      font-size: 0.9rem;
      color: #7b5e3b;
      font-style: italic;
    }

    .festival-banner {
      font-size: 0.95rem;
      color: #b48b3a;
      font-weight: 600;
      margin-top: 0.2rem;
    }

    .camera-section {
      padding: 0.8rem 1rem;
      text-align: center;
      background: #fdf8ed;
      border-bottom: 1px solid #e0c98a;
    }

    .camera-btn {
      background: #4e3b28;
      color: #f7f3e8;
      border: none;
      padding: 0.8rem 1.5rem;
      border-radius: 2rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.5px;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      transition: all 0.2s;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .camera-btn:active {
      transform: scale(0.96);
      background: #3a2b1c;
    }

    .camera-preview {
      margin-top: 0.8rem;
      position: relative;
      display: none;
    }

    .camera-preview img {
      max-width: 100%;
      max-height: 200px;
      border-radius: 1rem;
      border: 2px solid #d4a843;
      object-fit: contain;
      background: #fff;
    }

    .remove-photo {
      position: absolute;
      top: 0.3rem;
      right: 0.3rem;
      background: #c0392b;
      color: white;
      border: none;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .tabs {
      display: flex;
      border-bottom: 2px solid #d4a843;
      background: #fdf8ed;
    }

    .tab {
      flex: 1;
      padding: 0.8rem 0.5rem;
      text-align: center;
      font-weight: 600;
      color: #8b754f;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.85rem;
      border: none;
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .tab.active {
      color: #4e3b28;
      border-bottom: 3px solid #b48b3a;
      background: #fffef9;
    }

    .menu-content {
      flex: 1;
      overflow-y: auto;
      padding: 0.5rem 0;
      -webkit-overflow-scrolling: touch;
    }

    .tab-panel {
      display: none;
      padding: 0 0.8rem;
    }

    .tab-panel.active {
      display: block;
    }

    .menu-item {
      display: flex;
      align-items: center;
      padding: 0.7rem 0.5rem;
      border-bottom: 1px dotted rgba(160, 120, 60, 0.2);
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .item-info {
      flex: 1;
      min-width: 120px;
    }

    .item-name {
      font-weight: 600;
      font-size: 0.85rem;
      color: #3f3322;
      display: block;
    }

    .arabic-name {
      font-size: 0.7rem;
      color: #8b754f;
      font-style: italic;
      display: block;
    }

    .item-price {
      font-weight: 700;
      font-size: 0.8rem;
      color: #2d5e3b;
      background: #edf4e8;
      padding: 0.2rem 0.6rem;
      border-radius: 1rem;
      white-space: nowrap;
      text-align: center;
      min-width: 50px;
    }

    .qty-controls {
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .qty-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1.5px solid #c9a855;
      background: white;
      font-size: 1.1rem;
      font-weight: 700;
      color: #4e3b28;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .qty-btn:active {
      background: #f3e5ca;
      transform: scale(0.93);
    }

    .qty-input {
      width: 42px;
      height: 32px;
      border: 1.5px solid #c9a855;
      border-radius: 0.8rem;
      text-align: center;
      font-weight: 700;
      font-size: 0.95rem;
      background: white;
      color: #3e2e1c;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .item-total {
      font-weight: 700;
      font-size: 0.85rem;
      color: #1e4620;
      background: #eaf4e5;
      padding: 0.2rem 0.6rem;
      border-radius: 1rem;
      min-width: 55px;
      text-align: center;
      font-family: 'Courier New', monospace;
    }

    .bottom-bar {
      background: #f9f2e0;
      padding: 1rem 1.2rem;
      border-top: 2px solid #ddbc7a;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.8rem;
    }

    .total-label {
      font-family: 'Georgia', serif;
      font-weight: 700;
      font-size: 1rem;
      color: #5c471f;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .total-value {
      background: white;
      padding: 0.5rem 1.2rem;
      border-radius: 2rem;
      font-size: 1.4rem;
      font-weight: 700;
      color: #2b4f2b;
      font-family: 'Courier New', monospace;
      border: 1px solid #ddbc7a;
    }

    .reset-btn {
      background: #e7d5b5;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 1.5rem;
      font-weight: 600;
      color: #4e3b28;
      cursor: pointer;
      font-size: 0.85rem;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    #fileInput {
      display: none;
    }
  </style>
</head>
<body>
  <div class="app-container">
    
    <!-- Header -->
    <div class="app-header">
      <div class="church-name">OUR LADY OF ZEITOUN</div>
      <div class="sub-title">Coptic Orthodox Church</div>
      <div class="festival-banner">✦ Annual Egyptian Coptic Festival ✦</div>
    </div>

    <!-- Camera Section -->
    <div class="camera-section">
      <button class="camera-btn" onclick="document.getElementById('fileInput').click()">
        📸 Photograph Order Slip
      </button>
      <input type="file" id="fileInput" accept="image/*" capture="environment">
      <div class="camera-preview" id="cameraPreview">
        <img id="previewImage" src="" alt="Order slip photo">
        <button class="remove-photo" onclick="removePhoto()">✕</button>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" id="tab-sandwiches" onclick="switchTab('sandwiches')">🥙 Sandwiches</button>
      <button class="tab" id="tab-mains" onclick="switchTab('mains')">🍖 Main Dishes</button>
    </div>

    <!-- Menu Content -->
    <div class="menu-content">
      <div class="tab-panel active" id="sandwiches-panel"></div>
      <div class="tab-panel" id="mains-panel"></div>
    </div>

    <!-- Bottom Bar -->
    <div class="bottom-bar">
      <span class="total-label">💰 TOTAL</span>
      <span class="total-value" id="grandTotal">$0.00</span>
      <button class="reset-btn" onclick="resetAll()">🔄 Clear</button>
    </div>
  </div>

  <script>
    // Menu Data - All items with prices
    const menuData = {
      sandwiches: [
        { name: 'Beef Liver (Kebda)', arabic: 'ساندوتش كبدة', price: 7.00, qty: 0 },
        { name: 'Egyptian Sausage', arabic: 'ساندوتش سجق', price: 8.00, qty: 0 },
        { name: 'Kofta (ground beef)', arabic: 'ساندوتش كفتة', price: 10.00, qty: 0 },
        { name: 'Hawawshi (Ground Beef Pita)', arabic: 'حواشي', price: 10.00, qty: 0 },
        { name: 'Beef Shawerma', arabic: 'شاورمة لحمة', price: 10.00, qty: 0 },
        { name: 'Chicken Shawerma', arabic: 'شاورمة فراخ', price: 9.00, qty: 0 },
        { name: 'Feteer Savory Small', arabic: 'فطير حادق صغير', price: 15.00, qty: 0 },
        { name: 'Feteer Savory Large', arabic: 'فطير حادق كبير', price: 25.00, qty: 0 },
        { name: 'Feteer Sweet Small', arabic: 'فطير حلو صغير', price: 10.00, qty: 0 },
        { name: 'Feteer Sweet Large', arabic: 'فطير حلو كبير', price: 20.00, qty: 0 },
        { name: 'Plain Feteer Small', arabic: 'فطير سادة صغير', price: 5.00, qty: 0 },
        { name: 'Crepe / Waffles (sauce only)', arabic: '', price: 5.00, qty: 0 },
        { name: 'Crepe / Waffles (toppings)', arabic: '', price: 7.00, qty: 0 }
      ],
      mains: [
        { name: '1 Piece Kofta (grilled)', arabic: 'واحدة كفتة', price: 3.00, qty: 0 },
        { name: 'Beef Kebab Skewer', arabic: 'كباب لحم', price: 8.00, qty: 0 },
        { name: 'Chicken Kebab Skewer', arabic: 'كباب فراخ', price: 7.00, qty: 0 },
        { name: '5 Stuffed Grape Leaves', arabic: 'محشي ورق عنب', price: 3.00, qty: 0 },
        { name: '2 Piece Mombar (Sausage)', arabic: 'ممبار', price: 3.00, qty: 0 },
        { name: 'Bechamel Pasta', arabic: 'مكرونة بشاميل', price: 10.00, qty: 0 },
        { name: '2 Cheese Goulash', arabic: 'جلاش جبنة', price: 5.00, qty: 0 },
        { name: '1 Beef Goulash', arabic: 'جلاش لحمة', price: 3.00, qty: 0 },
        { name: 'Lamb Shank & Rice Meal', arabic: 'موزة خروف مع رز وورق عنب', price: 20.00, qty: 0 },
        { name: '1/2 Grilled Chicken & Rice', arabic: 'نص فرخة مشوية مع رز', price: 15.00, qty: 0 },
        { name: 'Beef Hooves & Rice', arabic: 'كوارع مع رز وورق عنب', price: 15.00, qty: 0 },
        { name: 'Rice with Nuts', arabic: 'رز بالخلطة', price: 3.00, qty: 0 },
        { name: 'Chicken Quesadilla', arabic: 'فراخ بالجبنة', price: 9.00, qty: 0 },
        { name: '4 Chicken Wings & Fries', arabic: 'أجنحة وبطاطس', price: 5.00, qty: 0 },
        { name: 'Duck Leg & Rice', arabic: 'بطة ورز', price: 10.00, qty: 0 }
      ]
    };

    // Render all menu items
    function renderAll() {
      renderCategory('sandwiches');
      renderCategory('mains');
    }

    function renderCategory(category) {
      const panel = document.getElementById(category + '-panel');
      const items = menuData[category];
      
      panel.innerHTML = items.map((item, index) => `
        <div class="menu-item">
          <div class="item-info">
            <span class="item-name">${item.name}</span>
            ${item.arabic ? `<span class="arabic-name">${item.arabic}</span>` : ''}
          </div>
          <span class="item-price">$${item.price.toFixed(2)}</span>
          <div class="qty-controls">
            <button class="qty-btn" onclick="changeQty('${category}', ${index}, -1)">−</button>
            <input type="number" class="qty-input" value="${item.qty}" min="0" 
              onchange="setQty('${category}', ${index}, this.value)" 
              onfocus="this.select()">
            <button class="qty-btn" onclick="changeQty('${category}', ${index}, 1)">+</button>
          </div>
          <span class="item-total" id="total-${category}-${index}">$${(item.price * item.qty).toFixed(2)}</span>
        </div>
      `).join('');
    }

    // Change quantity by delta
    window.changeQty = function(category, index, delta) {
      const item = menuData[category][index];
      item.qty = Math.max(0, item.qty + delta);
      updateDisplay(category, index);
      updateGrandTotal();
    };

    // Set quantity from input
    window.setQty = function(category, index, value) {
      const item = menuData[category][index];
      let qty = parseInt(value) || 0;
      item.qty = Math.max(0, qty);
      updateDisplay(category, index);
      updateGrandTotal();
    };

    // Update single item display
    function updateDisplay(category, index) {
      const item = menuData[category][index];
      const panel = document.getElementById(category + '-panel');
      const itemElements = panel.querySelectorAll('.menu-item');
      const element = itemElements[index];
      
      if (element) {
        const qtyInput = element.querySelector('.qty-input');
        const totalSpan = element.querySelector('.item-total');
        if (qtyInput) qtyInput.value = item.qty;
        if (totalSpan) totalSpan.textContent = '$' + (item.price * item.qty).toFixed(2);
      }
    }

    // Update grand total
    function updateGrandTotal() {
      let total = 0;
      for (const category in menuData) {
        menuData[category].forEach(item => {
          total += item.price * item.qty;
        });
      }
      document.getElementById('grandTotal').textContent = '$' + total.toFixed(2);
    }

    // Reset all
    window.resetAll = function() {
      if (confirm('Clear all quantities?')) {
        for (const category in menuData) {
          menuData[category].forEach(item => {
            item.qty = 0;
          });
        }
        renderAll();
        updateGrandTotal();
      }
    };

    // Switch tabs
    window.switchTab = function(tab) {
      document.getElementById('tab-sandwiches').classList.remove('active');
      document.getElementById('tab-mains').classList.remove('active');
      document.getElementById('sandwiches-panel').classList.remove('active');
      document.getElementById('mains-panel').classList.remove('active');
      
      if (tab === 'sandwiches') {
        document.getElementById('tab-sandwiches').classList.add('active');
        document.getElementById('sandwiches-panel').classList.add('active');
      } else {
        document.getElementById('tab-mains').classList.add('active');
        document.getElementById('mains-panel').classList.add('active');
      }
    };

    // File upload
    document.getElementById('fileInput').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(ev) {
          document.getElementById('previewImage').src = ev.target.result;
          document.getElementById('cameraPreview').style.display = 'block';
        };
        reader.readAsDataURL(file);
      }
      this.value = '';
    });

    window.removePhoto = function() {
      document.getElementById('cameraPreview').style.display = 'none';
      document.getElementById('previewImage').src = '';
    };

    // Initialize
    renderAll();
    updateGrandTotal();
    console.log('✅ Coptic Festival Calculator ready!');
  </script>
</body>
</html>
